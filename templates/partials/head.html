<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ site.title }}{% endblock %}</title>
<meta name="description" content="{% block description %}{{ site.description }}{% endblock %}">
<meta name="author" content="{{ site.author }}">
<link rel="canonical" href="{{ site.base_url }}{% block canonical %}{% endblock %}">

<meta property="og:type" content="{% block og_type %}website{% endblock %}">
<meta property="og:title" content="{% block og_title %}{{ site.title }}{% endblock %}">
<meta property="og:description" content="{% block og_description %}{{ site.description }}{% endblock %}">
<meta property="og:url" content="{{ site.base_url }}{% block og_url %}{% endblock %}">
<meta property="og:site_name" content="{{ site.title }}">

<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{% block tw_title %}{{ site.title }}{% endblock %}">
<meta name="twitter:description" content="{% block tw_description %}{{ site.description }}{% endblock %}">

<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ site.base_url }}/feed.xml">
<link rel="preload" href="/static/fonts/InstrumentSans-Variable.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/static/main.css">
