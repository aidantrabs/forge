{% extends "base.html" %}

{% block content %}
<section class="min-h-screen flex flex-col items-center justify-center px-6 relative">
    <span class="graffiti-bg select-none" aria-hidden="true">forge</span>
    <h1 class="text-[clamp(2rem,6vw,4rem)] font-semibold leading-tight text-center">
        {{ site.title }}
    </h1>
    <p class="mt-4 text-[clamp(0.875rem,2vw,1.125rem)] text-muted text-center max-w-[480px]">
        {{ site.description }}
    </p>
</section>

<section class="mx-auto max-w-[720px] px-6 pb-20">
    <div class="mb-12 label-with-line">
        <span class="text-[9px] font-semibold uppercase tracking-[0.2em] text-muted">posts</span>
    </div>

    {% for post in posts %}
    <article class="mb-12 animate-fade-in-up">
        <a href="/posts/{{ post.slug }}" class="group block">
            <div class="flex items-baseline justify-between gap-4">
                <h2 class="text-lg font-medium group-hover:text-accent transition-colors">
                    {{ post.title }}
                </h2>
                <time class="text-[9px] font-semibold uppercase tracking-[0.2em] text-muted shrink-0">
                    {{ post.date }}
                </time>
            </div>
            <p class="mt-2 text-sm text-muted">{{ post.description }}</p>
            <div class="mt-3 flex gap-2">
                {% for tag in post.tags %}
                <span class="text-[9px] font-semibold uppercase tracking-[0.2em] text-accent">{{ tag }}</span>
                {% endfor %}
            </div>
        </a>
    </article>
    {% endfor %}
</section>
{% endblock %}
