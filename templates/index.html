{% extends "base.html" %}

{% block content %}
<section class="relative mx-auto max-w-[900px] px-6 md:px-10 pt-28 md:pt-36 pb-20 md:pb-32">
    <span class="graffiti-bg select-none" aria-hidden="true">forge</span>

    <div class="mb-16">
        <h1 class="text-[clamp(32px,6vw,48px)] font-semibold leading-none tracking-tight">
            <span class="text-accent">forge</span>
        </h1>
        <p class="mt-3 text-[clamp(13px,1.5vw,15px)] text-muted leading-relaxed max-w-[480px]">
            {{ site.description }}
        </p>
    </div>

    <div class="mb-12 label-with-line">
        <span class="text-[9px] font-semibold uppercase tracking-[0.2em] text-muted">posts /</span>
    </div>

    {% for post in posts %}
    <article class="group py-8 border-b border-theme animate-fade-in-up">
        <a href="/posts/{{ post.slug }}" class="block" data-navigate>
            <time class="text-[9px] font-semibold uppercase tracking-[0.2em] text-muted block mb-3 md:hidden">
                {{ post.date }}
            </time>
            <div class="flex items-baseline justify-between gap-4">
                <h2 class="text-[clamp(17px,2vw,20px)] font-medium group-hover:text-accent transition-colors duration-200">
                    {{ post.title }}
                </h2>
                <time class="text-[9px] font-semibold uppercase tracking-[0.2em] text-muted shrink-0 hidden md:block">
                    {{ post.date }}
                </time>
            </div>
            <p class="mt-3 text-[clamp(13px,1.2vw,15px)] text-muted leading-relaxed max-w-[600px]">{{ post.description }}</p>
        </a>
        <div class="mt-4 flex gap-3">
            {% for tag in post.tags %}
            <a href="/tags/{{ tag }}" class="text-[10px] font-semibold uppercase tracking-[0.2em] text-accent hover:text-theme transition-colors" data-navigate>#{{ tag }}</a>
            {% endfor %}
        </div>
    </article>
    {% endfor %}

    <a href="/tags" class="text-[11px] font-semibold uppercase tracking-[0.2em] text-accent link-hover mt-8 inline-block" data-navigate>view all tags &rarr;</a>
</section>
{% endblock %}
