{% extends "base.html" %}

{% block title %}404 — {{ site.title }}{% endblock %}
{% block description %}page not found{% endblock %}

{% block content %}
<section class="min-h-screen flex flex-col items-center justify-center px-6">
    <span class="graffiti-bg select-none" aria-hidden="true">404</span>
    <h1 class="text-[clamp(2rem,6vw,4rem)] font-semibold">not found</h1>
    <p class="mt-4 text-muted">this page doesn't exist.</p>
    <a href="/" class="mt-8 text-[11px] font-semibold uppercase tracking-[0.2em] text-accent link-hover">
        back home
    </a>
</section>
{% endblock %}
