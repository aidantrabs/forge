{% extends "base.html" %}

{% block title %}tags — {{ site.title }}{% endblock %}
{% block description %}all tags{% endblock %}
{% block canonical %}/tags{% endblock %}

{% block content %}
<section class="mx-auto max-w-[720px] px-6 pt-32 pb-20">
    <div class="mb-12 label-with-line">
        <span class="text-[9px] font-semibold uppercase tracking-[0.2em] text-muted">tags</span>
    </div>

    <div class="flex flex-wrap gap-4">
        {% for tag in tags %}
        <a href="/tags/{{ tag.0 }}" class="group flex items-baseline gap-2">
            <span class="text-sm font-medium group-hover:text-accent transition-colors">{{ tag.0 }}</span>
            <span class="text-[9px] font-semibold uppercase tracking-[0.2em] text-muted">{{ tag.1 }}</span>
        </a>
        {% endfor %}
    </div>
</section>
{% endblock %}
