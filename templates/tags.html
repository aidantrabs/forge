{% extends "base.html" %}

{% block title %}tags — {{ site.title }}{% endblock %}
{% block description %}all tags{% endblock %}
{% block canonical %}/tags{% endblock %}

{% block content %}
<section class="mx-auto max-w-[900px] px-6 md:px-10 pt-24 md:pt-32 pb-20">
    <div class="mb-12 label-with-line">
        <span class="text-[9px] font-semibold uppercase tracking-[0.2em] text-muted">tags /</span>
    </div>

    {% for tag in tags %}
    <a href="/tags/{{ tag.0 }}" class="group flex items-baseline justify-between py-4 border-b border-theme" data-navigate>
        <span class="text-sm font-medium group-hover:text-accent transition-colors duration-200">#{{ tag.0 }}</span>
        <span class="text-[9px] font-semibold uppercase tracking-[0.2em] text-muted">{{ tag.1 }} posts</span>
    </a>
    {% endfor %}
</section>
{% endblock %}
